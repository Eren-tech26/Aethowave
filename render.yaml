services:
  - type: web
    name: aethowave-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -k uvicorn.workers.UvicornWorker --timeout 120
    plan: freeservices:
  - type: web
    name: aethowave-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -k uvicorn.workers.UvicornWorker --timeout 120
    plan: free
